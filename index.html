<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download VisionHelp</title>
  <meta name="description" content="Download VisionHelp — AI-powered visual assistant desktop app for macOS, Windows, and Linux." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-hover: #1a1a26;
      --border: #222233;
      --text: #e4e4ed;
      --text-muted: #8888aa;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }

    .hero {
      text-align: center;
      max-width: 640px;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #e4e4ed 0%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .version-badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      max-width: 860px;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
      transform: translateY(-2px);
    }

    .card.recommended {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .card .icon { font-size: 2rem; }

    .card .platform {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .card .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .card .badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      width: fit-content;
    }

    footer {
      margin-top: 4rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .loading { color: var(--text-muted); font-style: italic; }

    /* RESET PASSWORD SECITON */
    .reset-container {
      display: none; /* hidden by default */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      margin-top: 2rem;
    }
    .reset-container.active {
      display: block;
    }
    
    .reset-container h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: .5rem;
      color: var(--text);
    }
    .reset-container .subtitle {
      color: var(--text-muted);
      font-size: .875rem;
      margin-bottom: 2rem;
    }
    .reset-container label {
      display: block;
      font-size: .8125rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: .375rem;
    }
    .reset-container input[type="password"] {
      width: 100%;
      padding: .75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .9375rem;
      outline: none;
      transition: border-color .2s;
    }
    .reset-container input[type="password"]:focus {
      border-color: var(--accent);
    }
    .reset-container .field + .field { margin-top: 1rem; }
    .reset-container button {
      margin-top: 1.5rem;
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .reset-container button:hover { background: #4f46e5; }
    .reset-container button:disabled { opacity: .6; cursor: not-allowed; }
    .reset-container .msg {
      margin-top: 1rem;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .875rem;
      display: none;
    }
    .reset-container .msg.error { background: rgba(248, 113, 113, 0.1); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.2); display: block; }
    .reset-container .msg.success { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); display: block; }
    .reset-container .hint { font-size: .75rem; color: var(--text-muted); margin-top: .25rem; }

  </style>
</head>
<body>
  <!-- MAIN DOWNLOAD VIEW -->
  <div class="hero" id="mainHero">
    <div class="version-badge" id="version">Loading…</div>
    <h1>VisionHelp</h1>
    <p>AI-powered visual assistant for your desktop. Capture your screen, get instant AI analysis and help.</p>
  </div>
  <div class="downloads" id="mainDownloads">
    <p class="loading">Fetching latest release…</p>
  </div>
  <footer id="mainFooter">
    <p>Made with ♥ · <a href="https://github.com/vision-help/visionhelp-releases/releases">All releases</a></p>
  </footer>

  <!-- RESET PASSWORD VIEW -->
  <div class="reset-container" id="resetContainer">
    <h1>Reset your password</h1>
    <p class="subtitle">Enter your new password below.</p>
    <form id="resetForm">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
        <p class="hint">Minimum 8 characters</p>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" id="submitBtn">Reset Password</button>
      <div id="msg" class="msg"></div>
    </form>
  </div>

  <script>
    const REPO = 'vision-help/visionhelp-releases';
    // The backend URL is where the API requests go for password reset
    const BACKEND_URL = 'http://localhost:8080';

    const PLATFORMS = [
      { key: 'macos',   icon: '🍎', name: 'macOS',           ext: '.dmg',      meta: 'Universal (Intel + Apple Silicon)' },
      { key: 'windows', icon: '🪟', name: 'Windows',         ext: '.exe',      meta: 'NSIS Installer' },
      { key: 'linux-deb',icon: '🐧', name: 'Linux (Debian)', ext: '.deb',      meta: 'Debian / Ubuntu' },
      { key: 'linux-ai', icon: '🐧', name: 'Linux (Universal)', ext: '.AppImage', meta: 'AppImage — runs anywhere' },
    ];

    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('mac'))   return 'macos';
      if (ua.includes('win'))   return 'windows';
      if (ua.includes('linux')) return 'linux-deb';
      return null;
    }

    async function loadDownloads() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const release = await res.json();

        document.getElementById('version').textContent = release.tag_name;

        const userOS = detectOS();
        const container = document.getElementById('mainDownloads');
        container.innerHTML = '';

        for (const p of PLATFORMS) {
          const asset = release.assets.find(a => a.name.endsWith(p.ext));
          if (!asset) continue;

          const card = document.createElement('a');
          card.href = asset.browser_download_url;
          card.className = 'card' + (p.key === userOS || (userOS === 'linux-deb' && p.key === 'linux-ai') ? ' recommended' : '');
          card.innerHTML = `
            <span class="icon">${p.icon}</span>
            <span class="platform">${p.name}</span>
            <span class="meta">${p.meta} · ${(asset.size / 1048576).toFixed(1)} MB</span>
            ${p.key === userOS ? '<span class="badge">Recommended for your OS</span>' : ''}
          `;
          container.appendChild(card);
        }

        if (!container.children.length) {
          container.innerHTML = '<p class="loading">No assets found in the latest release.</p>';
        }
      } catch (err) {
        document.getElementById('mainDownloads').innerHTML =
          `<p class="loading">Could not load releases. <a href="https://github.com/${REPO}/releases" style="color:var(--accent)">View on GitHub →</a></p>`;
      }
    }

    function setupPasswordReset(token) {
      document.getElementById('mainHero').style.display = 'none';
      document.getElementById('mainDownloads').style.display = 'none';
      document.getElementById('mainFooter').style.display = 'none';
      
      const container = document.getElementById('resetContainer');
      container.classList.add('active');
      document.title = 'Reset Password — VisionHelp';

      const form = document.getElementById('resetForm');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');

      if (!token) {
        msg.textContent = 'Missing reset token. Please use the link from your email.';
        msg.className = 'msg error';
        btn.disabled = true;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.className = 'msg';
        msg.style.display = 'none';

        const pw = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;

        if (pw !== confirm) {
          msg.textContent = 'Passwords do not match.';
          msg.className = 'msg error';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting…';

        try {
          const resp = await fetch(`${BACKEND_URL}/api/v1/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, password: pw }),
          });
          const data = await resp.json();
          if (resp.ok) {
            msg.textContent = data.message || 'Password reset successfully!';
            msg.className = 'msg success';
            form.reset();
            btn.textContent = 'Done';
          } else {
            msg.textContent = data.error || 'Something went wrong.';
            msg.className = 'msg error';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
          }
        } catch {
          msg.textContent = 'Network error. Please try again.';
          msg.className = 'msg error';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      });
    }

    // Initialize based on URL parameters
    const params = new URLSearchParams(window.location.search);
    if (params.get('page') === 'reset-password') {
      setupPasswordReset(params.get('token'));
    } else {
      loadDownloads();
    }
  </script>
</body>
</html>
